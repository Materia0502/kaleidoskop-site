<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калейдоскоп — Видео</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <button class="icon-btn" aria-label="Открыть меню">☰</button>
      <div class="brand">
        <span class="brand__name">Калейдоскоп</span>
      </div>
    </div>

    <div class="topbar__search">
      <input id="videoIdInput" type="search" placeholder="Вставьте YouTube Video ID" />
      <button id="loadVideoBtn" class="search-btn">Загрузить</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav>
        <a class="sidebar__link sidebar__link--active" href="#">Главная</a>
      </nav>
    </aside>

    <main class="content">
      <section class="player-panel">
        <div class="video-wrap">
          <iframe
            id="mainPlayer"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="Плеер"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
        <h1 id="playerTitle" class="player-title">Ваше видео</h1>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
