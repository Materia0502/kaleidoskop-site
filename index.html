<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калейдоскоп — Видео</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <button class="icon-btn" aria-label="Открыть меню">☰</button>
      <div class="brand">
        <span class="brand__name">Калейдоскоп</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav>
        <a class="sidebar__link sidebar__link--active" href="#">Главная</a>
      </nav>
    </aside>

    <main class="content">
      <section class="watch-layout">
        <article class="player-panel">
          <div class="video-wrap is-hidden" id="videoWrap">
            <iframe
              id="mainPlayer"
              src="about:blank"
              allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
              allowfullscreen
              title="Плеер"
            ></iframe>
          </div>
          <p id="playerPlaceholder" class="player-placeholder">Выберите видео справа для просмотра</p>
          <h1 id="playerTitle" class="player-title"></h1>
        </article>

        <aside class="playlist-panel">
          <h2 class="playlist-title">Список видео</h2>
          <div id="videoList" class="video-list"></div>
        </aside>
      </section>
    </main>
  </div>

  <template id="videoItemTemplate">
    <button class="video-item" type="button">
      <span class="video-item__title"></span>
      <span class="video-item__meta"></span>
    </button>
  </template>

  <script src="script.js"></script>
</body>
</html>
